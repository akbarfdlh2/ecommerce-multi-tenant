version: '3.8'

services:
  # ─── PHP-FPM (Laravel) ──────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: ./docker/php/Dockerfile
    container_name: ecommerce_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
    networks:
      - ecommerce_network
    depends_on:
      - mongodb

  # ─── Nginx ──────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: ecommerce_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - ecommerce_network
    depends_on:
      - app

  # ─── Vue.js Dev Server ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./docker/node
      dockerfile: Dockerfile
    container_name: ecommerce_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    networks:
      - ecommerce_network
    environment:
      - VITE_API_URL=http://localhost:8000/api

  # ─── MongoDB ────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: ecommerce_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: secret
      MONGO_INITDB_DATABASE: ecommerce_central
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongodb/init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - ecommerce_network

  # ─── Mongo Express (DB UI) ──────────────────────────────────────────────────
  mongo-express:
    image: mongo-express:1.0
    container_name: ecommerce_mongo_express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: secret
      ME_CONFIG_MONGODB_URL: mongodb://root:secret@mongodb:27017/
      ME_CONFIG_BASICAUTH: false
    networks:
      - ecommerce_network
    depends_on:
      - mongodb

# ─── Volumes & Networks ───────────────────────────────────────────────────────
volumes:
  mongodb_data:
    driver: local

networks:
  ecommerce_network:
    driver: bridge
